name: Release

on:
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        shell: bash
        run: mvn -B clean package --no-transfer-progress -DskipTests

      - name: Prepare dist directory
        shell: bash
        run: mkdir -p dist

      - name: Package with script (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path 'staging\*' -DestinationPath "dist/javafx-tool-template-windows-$env:APP_VERSION.zip" -Force
          Write-Host "Created dist/javafx-tool-template-windows-$env:APP_VERSION.zip"
          Remove-Item -Path 'staging' -Recurse -Force

      - name: Package with script (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: bash ./scripts/package.sh linux

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd staging
          zip -r "../dist/javafx-tool-template-linux-${APP_VERSION}.zip" .
          cd ..
          echo "Created dist/javafx-tool-template-linux-${APP_VERSION}.zip"
          rm -rf staging

      - name: Package with script (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: bash ./scripts/package.sh mac

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd staging
          zip -r "../dist/javafx-tool-template-macos-${APP_VERSION}.zip" .
          cd ..
          echo "Created dist/javafx-tool-template-macos-${APP_VERSION}.zip"
          rm -rf staging

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
